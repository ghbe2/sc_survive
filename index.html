<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>しゅがさば v1-dev</title>
    <style>
        :root { --paper:#fdf6ec; --ink:#4a3a48; --pink:#ff5fa2; --yellow:#ffd94a; --cyan:#4adcff; --purple:#b48cff; --mint:#5fe8b0; --sticker-shadow:0 3px 0 rgba(74,58,72,.35); }
        body { margin: 0; overflow: hidden; background: var(--paper); touch-action: none; font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI",sans-serif; color:var(--ink); user-select:none; -webkit-user-select:none; font-weight:700; }
        canvas { display: block; }
        .scene { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:flex-start; background-color:var(--paper); background-image:linear-gradient(rgba(255,95,162,.09) 1px,transparent 1px),linear-gradient(90deg,rgba(74,220,255,.09) 1px,transparent 1px); background-size:24px 24px; z-index:100; text-align:center; padding:10px; overflow-y:auto; }

        /* UIパーツ */
        .shop-header { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 4px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        #shop-best { width: 100%; max-width: 400px; text-align: right; color: #0ff; font-size: 12px; margin-bottom: 10px; }
        .upgrade-grid { display: grid; grid-template-columns: 1fr; gap: 8px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .upgrade-card { background: #222; border: 1px solid #444; padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
        .up-info { text-align: left; }
        .up-name { font-size: 14px; color: #0ff; font-weight: bold; }
        .up-val { font-size: 11px; color: #888; }
        .up-btn { background: #444; color: #fff; border: none; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; min-width: 80px; }
        .up-btn.can-buy { background: #f0f; color: #fff; box-shadow: 0 0 5px #f0f; }
        .up-btn:active { transform: scale(0.95); }

        #preview-box { width: 100%; max-width: 400px; height: 60px; background: #000; border: 2px solid #444; border-radius: 10px; margin-bottom: 5px; flex-shrink: 0; }
        .selected-slots { display: flex; gap: 8px; margin-bottom: 10px; }
        .slot { width: 50px; height: 50px; border: 2px dashed #555; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 26px; background: rgba(255,255,255,0.05); }
        .slot.filled { border: 2px solid #f0f; background: rgba(255,0,255,0.1); }
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 400px; margin-bottom: 8px; }
        .char-card { position: relative; background: #222; border: 2px solid #444; padding: 8px 4px; border-radius: 6px; cursor: pointer; }
        .char-card.selected { border-color: #f0f; box-shadow: 0 0 8px #f0f; }
        .char-card .trait-tag { display: block; font-size: 9px; font-weight: bold; margin-top: 2px; }
        .char-thumb { width:34px; height:34px; object-fit:contain; vertical-align:middle; }

        .main-btn { width: 100%; max-width: 300px; padding: 12px; border-radius: 30px; background: #444; color: #aaa; border: none; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .main-btn.active { background: linear-gradient(45deg, #f0f, #80f); color: white; box-shadow: 0 4px 15px rgba(255,0,255,0.4); cursor: pointer; }

        /* レベルアップ / ミッション オーバーレイ */
        .overlay-menu { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 90; text-align: center; padding: 20px; }
        .draft-card { background: #1c1c2e; border: 2px solid #ffd700; border-radius: 10px; padding: 14px; width: 90%; max-width: 340px; margin-bottom: 10px; cursor: pointer; text-align: left; }
        .draft-card:active { transform: scale(0.97); }
        .draft-name { font-size: 16px; font-weight: bold; color: #ffd700; }
        .draft-desc { font-size: 12px; color: #aaa; margin-top: 3px; }

        /* ゲームUI */
        #game-ui { position: absolute; inset: 0; pointer-events: none; display: none; }
        .stat-box { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 8px; border-radius: 8px; color: #0ff; font-size: 10px; pointer-events: none; text-align: left; line-height: 1.7; }
        #score-box { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
        #score-val { font-weight: bold; font-size: 18px; color: #fff; transition: color 0.2s; }
        #score-mult { font-size: 11px; color: #888; }
        .status-group { position: absolute; top: 10px; right: 10px; width: 160px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        #top-members { position: absolute; top: 44px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
        .big-btn { flex: 1; padding: 15px 0; background: rgba(0,0,0,0.8); border: 1px solid #666; border-radius: 14px; color: #eee; font-size: 16px; font-weight: bold; cursor: pointer; font-family: inherit; }
        .big-btn:active { transform: scale(0.97); }
        .big-btn.ready-glow { border-color: #0f8; box-shadow: 0 0 14px #0f8; color: #cffde8; }
        #time-display { color: #8ff; font-size: 12px; font-weight: bold; }
        .bar-bg { position: relative; width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; border: 1px solid #555; }
        #trait-display { color: #ffd700; font-size: 10px; text-align: right; }
        #heart-display { font-size: 15px; letter-spacing: 2px; line-height: 1; text-align: right; }
        #buff-display { text-align: right; }
        .buff-chip { display: inline-block; background: rgba(0,0,0,0.75); border: 1px solid #665; border-radius: 8px; padding: 1px 6px; margin: 2px 0 0 4px; font-size: 11px; color: #fd5; }
        #level-display { color: #0ff; font-size: 11px; font-weight: bold; }

        #joystick-base { position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: none; pointer-events: none; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #joystick-stick { position: absolute; width: 30px; height: 30px; background: rgba(255,255,255,0.2); border-radius: 50%; left: 45px; top: 45px; }

        #bottom-controls { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; gap: 12px; padding: 0 14px; pointer-events: auto; }
        .member-btns { display: flex; gap: 10px; }
        .btn-member { position: relative; overflow: hidden; width: 50px; height: 50px; background: #222; border: 2px solid #444; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.1s; }
        .btn-member.active { border-color: #f0f; box-shadow: 0 0 10px #f0f; background: #322; transform: scale(1.1); }
        .btn-member.maxed { border-color: #ff0; box-shadow: 0 0 12px #ff0; }
        .btn-member.danger { border-color: #c39; }
        .btn-member.dead { opacity: 0.25; filter: grayscale(1); }
        .btn-member .mini-gauge { position: absolute; bottom: 0; left: 0; height: 4px; width: 0%; background: linear-gradient(90deg, #f0f, #ff69b4); }
        .btn-member .face-img { width:46px; height:46px; object-fit:contain; }
        #gesture-hint { position: absolute; bottom: 110px; width: 100%; text-align: center; color: rgba(255,255,255,0.35); font-size: 10px; pointer-events: none; }
        #ensemble-banner { position:absolute; inset:0; display:none; align-items:center; justify-content:center; pointer-events:none; z-index:80; font-weight:900; color:#fff; text-shadow:0 0 12px #f0f, 0 0 28px #f80; }
        #buzz-banner { position:absolute; inset:0; display:none; align-items:center; justify-content:center; pointer-events:none; z-index:82; font-size:56px; font-weight:900; color:#fff; background:rgba(255,40,180,.18); text-shadow:0 0 14px #f0f,0 0 30px #ff0; }
        #level-progress { position:absolute; top:10px; left:10px; width:145px; color:#0ff; font-size:11px; text-align:left; }
        #level-progress .bar-bg { margin-top:3px; height:8px; }
        #level-progress-fill { height:100%; background:linear-gradient(90deg,#0ff,#0f8); width:0; }
        #result-retry-hint { animation:retryBlink .8s steps(2,end) infinite; color:#ff8; font-weight:bold; margin-top:18px; }
        .result-link { background:none; border:none; color:#aaa; padding:8px 12px; font:inherit; text-decoration:underline; }
        @keyframes retryBlink { 50% { opacity:.25; } }
        /* ステッカーUI */
        h1,h2,h3,#score-val,#time-display,#level-progress-text,#trait-display { color:var(--ink)!important; -webkit-text-stroke:.7px #fff; paint-order:stroke fill; text-shadow:-1px -1px #fff,1px -1px #fff,-1px 1px #fff,1px 1px #fff,0 2px #fff; }
        .upgrade-card,.char-card,.slot,#preview-box,.draft-card,.stat-box,.btn-member,.buff-chip,.bar-bg { border:3px solid #fff; box-shadow:var(--sticker-shadow); color:var(--ink); }
        .upgrade-card,.char-card,.slot,#preview-box,.draft-card,.stat-box { background:rgba(255,255,255,.86); border-radius:18px; }
        .char-card:nth-child(odd),.draft-card:nth-child(odd){transform:rotate(-1deg)}
        .char-card:nth-child(even),.draft-card:nth-child(even){transform:rotate(1deg)}
        .char-card.selected,.slot.filled { border-color:var(--yellow); background:#fff9d8; box-shadow:0 3px 0 rgba(74,58,72,.35),0 0 0 3px #fff; }
        #preview-box { background:#fffdf8; }
        .main-btn,.big-btn,.up-btn,#se-toggle,#menu-scene button:not(.main-btn),.result-link { border:3px solid #fff!important; border-radius:18px!important; background:var(--pink)!important; color:#fff!important; box-shadow:var(--sticker-shadow); text-decoration:none; font-weight:900; text-shadow:0 1px 1px rgba(74,58,72,.3); }
        .main-btn:active,.big-btn:active,.up-btn:active,#menu-scene button:active,.result-link:active { transform:translateY(3px); box-shadow:none; }
        .main-btn:not(.active){background:#d8ced5!important}.main-btn.active{background:linear-gradient(135deg,var(--pink),var(--purple))!important}
        .overlay-menu { background:rgba(253,246,236,.92); color:var(--ink); }
        .overlay-menu::before { content:""; position:absolute; z-index:0; width:min(88vw,390px); height:min(78vh,620px); background:rgba(255,255,255,.94); border:4px solid #fff; border-radius:22px; box-shadow:0 5px 0 rgba(74,58,72,.28); }
        .overlay-menu>* { position:relative; z-index:1; }
        .draft-card { border-color:#fff; background:#fff6c9; }
        .draft-name,.up-name,#level-display { color:var(--pink); }.draft-desc,.up-val,#score-mult { color:#756674; }
        .stat-box,.buff-chip { background:rgba(255,255,255,.9); border-radius:12px; }
        .buff-chip { color:var(--ink); border-width:2px; background:#e9ddff; }
        .btn-member { background:#fff; border-radius:16px; }
        .btn-member.active { border-color:var(--yellow); background:#fff8cf; box-shadow:0 3px 0 rgba(74,58,72,.35),0 0 0 2px var(--yellow); }
        .btn-member.maxed { border-color:var(--yellow); }.btn-member.danger{border-color:var(--purple)}
        .bar-bg { background:#eadfe5; border-radius:999px; overflow:hidden; }
        #level-progress-fill { background:linear-gradient(90deg,var(--pink),#ff91bd); }
        #bottom-controls .big-btn { background:var(--cyan)!important; }
        #gesture-hint { color:rgba(74,58,72,.55); text-shadow:0 1px #fff; }
        #heart-display span { -webkit-text-stroke:2px #fff; paint-order:stroke fill; filter:drop-shadow(0 2px 0 rgba(74,58,72,.25)); }
        #ensemble-banner { color:var(--ink); text-shadow:-2px -2px #fff,2px -2px #fff,-2px 2px #fff,2px 2px #fff,0 4px 0 rgba(74,58,72,.3); }
        /* タイトル＋編成：手帳デコ */
        .notebook-scene { box-sizing:border-box; padding:calc(env(safe-area-inset-top,0px) + 8px) 12px calc(env(safe-area-inset-bottom,0px) + 10px); gap:8px; }
        .notebook-head { width:100%; max-width:420px; display:flex; justify-content:flex-start; }
        .washi-title { position:relative; padding:5px 22px 6px 17px; background:rgba(255,95,162,.72); color:#fff; font-size:25px; line-height:1; transform:rotate(-2deg); text-shadow:0 2px rgba(74,58,72,.25); clip-path:polygon(2% 8%,98% 0,95% 92%,0 100%); }
        .char-speech { position:relative; width:min(88vw,350px); min-height:38px; box-sizing:border-box; padding:9px 16px; border:3px solid #fff; border-radius:18px; background:#fff7c8; box-shadow:var(--sticker-shadow); font-size:13px; display:flex; align-items:center; justify-content:center; }
        .char-speech::after { content:""; position:absolute; left:24px; bottom:-10px; border:8px solid transparent; border-top-color:#fff7c8; transform:rotate(12deg); }
        .paste-board { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; width:100%; max-width:390px; flex:1 0 auto; }
        .paste-slot { position:relative; min-height:125px; aspect-ratio:1.18; display:flex; align-items:center; justify-content:center; border:3px dashed rgba(180,140,170,.45); border-radius:24px; background:rgba(255,255,255,.48); color:#b9a9b5; font-size:12px; cursor:pointer; overflow:visible; }
        .paste-slot::before { content:"ぺたっ"; opacity:.45; }
        .paste-slot.filled { border-color:transparent; background:transparent; box-shadow:none; }
        .paste-slot.filled::before { display:none; }
        .paste-slot .paste-img { width:min(34vw,142px); height:min(34vw,142px); object-fit:contain; filter:drop-shadow(0 2px 0 #fff) drop-shadow(0 -2px 0 #fff) drop-shadow(2px 0 0 #fff) drop-shadow(-2px 0 0 #fff); }
        .paste-slot .fallback-face { font-size:72px; }
        .paste-name { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); padding:2px 9px; border:2px solid #fff; border-radius:12px; background:var(--yellow); color:var(--ink); font-size:11px; white-space:nowrap; }
        .paste-slot.just-stuck { animation:petat .28s cubic-bezier(.2,.85,.3,1.3); }
        @keyframes petat { from { transform:scale(1.15) rotate(var(--sticker-rot)); opacity:.55; } to { transform:scale(1) rotate(var(--sticker-rot)); opacity:1; } }
        .sticker-sheet { display:grid; grid-template-columns:repeat(6,1fr); gap:4px; width:100%; max-width:390px; padding:7px; box-sizing:border-box; border:3px solid #fff; border-radius:18px; background:rgba(255,255,255,.72); box-shadow:var(--sticker-shadow); }
        .sticker-sheet .char-card { min-width:0; padding:3px 1px; border:1px dashed #d7c8d2; border-radius:10px; background:#fffdf8; box-shadow:none; transform:none; }
        .sticker-sheet .char-card .sheet-img { width:42px; max-width:100%; height:42px; object-fit:contain; }
        .sticker-sheet .char-card .sheet-name { display:block; font-size:8px; overflow:hidden; white-space:nowrap; }
        .sticker-sheet .char-card.selected { border-color:#d7c8d2; background:rgba(230,220,226,.5); box-shadow:none; }
        .sticker-sheet .char-card.selected img,.sticker-sheet .char-card.selected .fallback-face { opacity:.14; filter:grayscale(1); }
        .sticker-sheet .char-card.selected::after { content:"はりつけ中"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#927b8d; font-size:7px; transform:rotate(-12deg); }
        #start-btn { margin-top:2px; flex:0 0 auto; }
        .notebook-reset { border:0; background:none; color:#a693a1; font-size:9px; padding:2px 8px; }
        @media (max-height:670px) { .notebook-scene{gap:4px}.washi-title{font-size:21px}.char-speech{min-height:32px;padding:6px 12px}.paste-slot{min-height:104px}.paste-slot .paste-img{height:112px}.sticker-sheet .char-card .sheet-img{height:34px} }
    </style>
</head>
<body>

    <div id="shop-scene" class="scene notebook-scene">
        <div class="notebook-head"><div class="washi-title">しゅがさば</div></div>
        <div id="char-desc" class="char-speech">シールをえらんでね</div>
        <div class="paste-board">
            <div class="paste-slot" id="slot-0" onclick="removeStickerAt(0)"></div><div class="paste-slot" id="slot-1" onclick="removeStickerAt(1)"></div>
            <div class="paste-slot" id="slot-2" onclick="removeStickerAt(2)"></div><div class="paste-slot" id="slot-3" onclick="removeStickerAt(3)"></div>
        </div>
        <div id="char-grid" class="sticker-sheet"></div>
        <button onclick="tryStart()" id="start-btn" class="main-btn">あと4人選んでください</button>
        <button onclick="resetSave()" class="notebook-reset">データ初期化</button>
    </div>

    <div id="game-ui">
        <div id="top-members">
            <div class="member-btns" id="member-btns"></div>
        </div>
        <div id="score-box">
            <div id="score-val">0</div>
            <div id="score-mult">x1.0</div>
        </div>
        <div id="level-progress"><span id="level-progress-text">Lv0　❤0/4</span><div class="bar-bg"><div id="level-progress-fill"></div></div></div>
        <div class="status-group">
            <div id="time-display">⏱ 0:00</div>
            <div id="heart-display"></div>
            <div id="buff-display"></div>
        </div>
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        <div id="gesture-hint">引っ張る=移動　タップ=交代　長押し=爆発(♡消費)　止まる=チャージ</div>
        <div id="bottom-controls">
            <button class="big-btn" onclick="openMenu()">☰ メニュー</button>
        </div>
        <div id="ensemble-banner"></div>
        <div id="buzz-banner">LEVEL UP</div>
    </div>

    <div id="level-scene" class="overlay-menu">
        <h2 style="color:#ffd700; margin:0 0 5px 0;">LEVEL UP!</h2>
        <div style="color:#aaa; font-size:12px; margin-bottom:12px;">強化を選ぶと📦で届く</div>
        <div id="level-list" style="width:100%; display:flex; flex-direction:column; align-items:center; overflow-y:auto;"></div>
    </div>
    <div id="menu-scene" class="overlay-menu">
        <h2 style="color:#0ff; margin:0 0 12px 0;">☰ メニュー</h2>
        <div id="mission-body" style="font-size:14px; line-height:1.6; margin-bottom:16px;"></div>
        <button id="se-toggle" onclick="toggleSE()" style="background:none; border:1px solid #688; border-radius:20px; color:#8ff; padding:9px 26px; margin-bottom:8px; font-family:inherit;">🔊 SE ON</button>
        <button onclick="closeMenu()" class="main-btn active" style="max-width:220px;">閉じて戦闘へ</button>
        <button onclick="menuRetry()" style="background:none; border:1px solid #666; border-radius:20px; color:#aaa; padding:9px 26px; margin-top:16px; font-family:inherit;">🔄 リトライ (同じ編成で最初から)</button>
        <button onclick="retireRun()" style="background:none; border:1px solid #833; border-radius:20px; color:#c66; padding:9px 26px; margin-top:8px; font-family:inherit;">🏳️ リタイア (ランを終了)</button>
    </div>

    <div id="result-scene" class="scene" style="justify-content: center;">
        <h1 id="res-title" style="font-size: 36px; margin: 0;"></h1>
        <div id="res-score" style="font-size: 44px; font-weight: bold; color: #fff; margin: 10px;"></div>
        <p id="res-stats" style="color:#ccc; margin:10px; font-size:14px; line-height:1.9;"></p>
        <p id="res-likes" style="color:#ffd700; font-size:18px; font-weight:bold;"></p>
        <div id="result-retry-hint">タップでもう1回</div>
        <div style="margin-top:12px;">
            <button class="result-link" onclick="resultGoSetup(event)">手帳へ戻る</button>
        </div>
    </div>

    <canvas id="mainCanvas"></canvas>

<script>
// ================================================================
// 十二支サバイバー v1 開発版 (コアv3: 特性継承・立ち止まりチャージ・宅配ドラフト・ミッション)
// 基本ループ: かわす → 倒す → 稼ぐ → レベルアップ(宅配ボックス3択) → 強くなる
// ゲージ: 50起点の綱引き。停止/🩸は白方向、被弾は黒方向。100で白♡、0で黒♡
// 操作: ドラッグ=移動 / ダブルタップ=交代 / 立ち止まる=チャージ
// ================================================================

// ---------------- CONFIG: バランス定数はここに集約 ----------------
const CONFIG = {
    STEP_MS: 1000 / 60,
    MAX_FRAME_MS: 100,
    GRID_SIZE: 100,
    PROP_SAFE_DIST: 120,
    PROP_FIELD_RADIUS: 1300, PROP_DESPAWN_RADIUS: 1800, PROP_CELL: 350,
    PROP_REFRESH_INTERVAL: 30, DROP_DESPAWN_RADIUS: 2500,
    STUCK_DISTANCE:30, STUCK_FRAMES:300, STUCK_SLOW_FRAMES:600, STUCK_SCREEN_MARGIN:80,
    // --- レベルアップ + 宅配ドロップ ---
    DELIVERY_DELAY: 300,                    // 注文から投下まで (約5秒)
    DELIVERY_DIST_MIN: 180, DELIVERY_DIST_MAX: 340,
    EXTRA_SHOT_ANGLE: 0.15, EXTRA_AREA_DELAY: 6,
    SHOP_SIZE_STEP: 0.6, SHOP_RANGE_STEP: 0.4, SHOP_BURST_REDUCE: 180,
    SHOE_STEP: 0.08, MENTAL_STEP: 0.85, MAGNET_STEP: 40,
    LEVEL_FIRST: 4,
    ENEMY_MAX: 8, ENEMY_MAX_CAP: 18,
    ENEMY_SPAWN_INTERVAL: 100, SPAWN_MIN_INTERVAL: 40, ENEMY_SPAWN_DIST: 500,
    TARGET_RANGE: 600,
    BULLET_SPEED: 12, BULLET_LIFE: 45, BULLET_SIZE: 5,
    CONTACT_DIST: 40, CONTACT_INTERVAL: 20, CONTACT_SEX: 6, CONTACT_KNOCK: 12,
    CONTACT_INVULN: 45,
    CONTACT_CHARGE_LOCK: 60,                                // 接触中/接触後1秒は自力チャージ無効
    ENEMY_BULLET_SEX: 15,
    PICKUP_RADIUS: 50,
    DROP_BLOOD_RATE: 0.30,
    PROP_DROP_VAL: 1, ENEMY_DROP_VAL: 1, BOSS_DROP_VAL: 1,

let moveVec = {x:0, y:0}, joyStart = {x:0, y:0}, lastAim = {x:1, y:0};
let moveTouchId = null;
let lastTap = { t: 0, x: 0, y: 0 };
const gestures = new Map();   // id -> {x, y, t, moved}

function isUiTarget(t) { return !!(t && t.closest && (t.closest('#bottom-controls') || t.closest('#top-members') || t.closest('.overlay-menu'))); }
function joyMove(x, y) {
    const dx = x - joyStart.x, dy = y - joyStart.y;
    const d = Math.hypot(dx, dy) || 1, m = Math.min(d, CONFIG.JOY_RADIUS);
    moveVec = { x: (dx/d) * (m/CONFIG.JOY_RADIUS), y: (dy/d) * (m/CONFIG.JOY_RADIUS) };
    joyStick.style.transform = `translate(${moveVec.x*40}px, ${moveVec.y*40}px)`;
}
function joyEnd() { moveVec = {x:0, y:0}; joyBase.style.display = 'none'; joyStick.style.transform = 'translate(0,0)'; }

function gestureStart(id, x, y) {
    if(!inGame || isOver || paused) return;
    gestures.set(id, { x, y, t: Date.now(), moved: false });
}
function gestureMove(id, x, y) {
    const g = gestures.get(id);
    if(!g) return;
    if(id === moveTouchId) { joyMove(x, y); return; }
    if(!g.moved && Math.hypot(x - g.x, y - g.y) > CONFIG.DRAG_PX) {
        g.moved = true;
        if(moveTouchId === null) {
            moveTouchId = id;
            joyStart = { x: g.x, y: g.y };
            joyBase.style.display = 'block';
            joyMove(x, y);
        }
    }
}
function gestureEnd(id) {
    const g = gestures.get(id);
    gestures.delete(id);
    if(id === moveTouchId) { moveTouchId = null; joyEnd(); return; }
    if(!g || !inGame || isOver || paused || g.moved) return;
    // 単タップ(TAP_MS未満で離す)=交代 / 長押し(継続)=爆発は update 内で処理済み
    if(Date.now() - g.t < CONFIG.TAP_MS) switchNext();
}

}, {passive:false});

}, {passive:false});

function effDmg(p) {

    if(p.pas === 'blackPower') d *= 1 + p.black * 0.15;   // 瑞珠: 黒♡が多いほど攻撃力UP
    if(buffs.bell > 0) d *= 1.5;                           // ベルペット爆発: 攻撃力UP
    return d;
}

    if(p.pas === 'whiteRange') r *= 1 + p.white * 0.08;    // ユゥナリナ: 白♡が多いほど射程UP

// ---------------- 交代 = 置き土産 (白♡を使い切るまでCTごとに自分の爆発を繰り返す) ----------------
function switchNext() {
    if(isOver || switchTimer > 0) return;
    if(party.filter(m => !m.dead).length < 2) { pushText("交代できない...", "#888", 25); return; }
    for(let k = 1; k < party.length; k++) {
        const i = (activeIdx + k) % party.length;
        if(!party[i].dead) { doSwitch(i); return; }
    }
}
function switchMember(i) {   // ボタン直接指名
    if(isOver || switchTimer > 0 || !party[i] || party[i].dead || i === activeIdx) return;
    doSwitch(i);
}
function doSwitch(i) {
    const out = party[activeIdx];
    if(!out.dead && out.white > 0) {
        devices.push({ id: out.id, e: out.e, x: worldX, y: worldY, left: out.white, timer: CONFIG.DEVICE_FIRST_DELAY });
        out.white = 0; out.stun = 30;
        pushText("置き土産！CTごとに爆発を続ける", "#ff6", 45, -85);
        missionEvent('maxswitch');
    }
    // 置き土産中のキャラに切り替えたら、その置き土産は強制終了
    const inId = party[i].id;
    const before = devices.length;
    devices = devices.filter(d => d.id !== inId);
    if(devices.length < before) pushText("置き土産を回収した", "#888", 35, -70);
    activeIdx = i;
    const activeDevices = devices.filter(d => !d.dead && d.left > 0);
    if(activeDevices.length >= 2) resolveEnsemble(activeDevices.length, party[activeIdx], activeDevices);
    switchTimer = CONFIG.SWITCH_COOLDOWN;
    playSE('switch');
    updateMemberUI();
}
function updateDevices() {
    devices.forEach(d => {
        if(--d.timer > 0) return;
        fireDevice(d);
    });
    devices = devices.filter(d => !d.dead);
}
function burstCooldown() { return Math.max(CONFIG.BURST_COOLDOWN_MIN, CONFIG.BURST_COOLDOWN * Math.pow(1-CONFIG.BOND_BURST_PER,bondStacks)); }
function fireDevice(d) {
    d.timer = burstCooldown();
    burstCommon(d.x, d.y, false);
    executeBurst(d.id, d.x, d.y);
    if(--d.left <= 0) d.dead = true;
}
function ensembleLabel(n) {
    return n >= 4 ? '「百獣」の王！！' : n === 3 ? '「猛獣」の如し！！' : n === 2 ? '「野獣」っぷり！！' : '???';
}
function triggerEnsemble(p) {
    const active = devices.filter(d => !d.dead && d.left > 0);
    const uniqueIds = new Set(active.map(d => d.id));
    const people = 1 + uniqueIds.size;
    if(people < 2) return;
    resolveEnsemble(people, p, active);
}
function resolveEnsemble(people, p, active) {
    if(frame - lastEnsembleFrame < CONFIG.ENSEMBLE_REARM) return;
    lastEnsembleFrame = frame;
    active.slice().forEach(fireDevice);
    devices = devices.filter(d => !d.dead);
    addScore(people * people * CONFIG.ENSEMBLE_SCORE);
    if(people === 3 && p.black > 0) { p.black--; p.white++; }
    if(people >= 4) party.filter(m => !m.dead && m.black > 0).forEach(m => { m.black--; m.white++; });
    bondStacks += people - 1;
    if(people > saveData.bestEnsemble) { saveData.bestEnsemble = Math.min(4, people); saveGame(); }

// ---------------- 爆発 (裏の顔) ----------------
// 長押しで白♡1消費。共通効果=小ノックバック+短い無敵(緊急脱出)。個性は executeBurst
function tryBurst(p) {
    if(isOver || p.dead || p.stun > 0 || p.white <= 0) return;
    if(burstCd > 0) { if(frame % 60 === 0) pushText(`爆発まであと${Math.ceil(burstCd / 60)}秒`, "#888", 30); return; }
    p.white--;
    p.reaction='overflow';p.reactionUntil=frame+36;
    burstCd = burstCooldown();
    burstCommon(worldX, worldY, true);
    executeBurst(p.id, worldX, worldY);
    addScore(CONFIG.BURST_SCORE);
    triggerEnsemble(p);
    updateMemberUI();
}
function burstCommon(x, y, self) {
    enemies.forEach(en => {
        const d = Math.hypot(en.x - x, en.y - y) || 1;
        if(d < CONFIG.BURST_KNOCK_R) { en.x += (en.x - x) / d * CONFIG.BURST_KNOCK; en.y += (en.y - y) / d * CONFIG.BURST_KNOCK; }
    });
    if(self) invulnTimer = Math.max(invulnTimer, CONFIG.BURST_INVULN);
    burstFx = { x, y, r: CONFIG.BURST_KNOCK_R, l: 20, maxL: 20, c: self ? "#f0f" : "#fa0" };
    playSE('burst');
}
// キャラ固有の爆発 (裏の顔)。バフ系はグローバル=操作中のキャラに乗る。x,y=発生源(本人 or 置き土産)
function executeBurst(id, x, y, depth = 0) {
    const B = CONFIG.BUFF_TIME;
    switch(id) {
        case 0:   // ミナリ: 障害物を設置 + アイテム効果2倍
            for(let k = 0; k < 3; k++) {
                const a = Math.PI * 2 * k / 3 + Math.random();
                const candidate={x:x+Math.cos(a)*110,y:y+Math.sin(a)*110,r:40,t:'🪨'};
                if(Math.hypot(candidate.x-worldX,candidate.y-worldY)<candidate.r+50)continue;
                if(props.some(pr=>Math.hypot(pr.x-candidate.x,pr.y-candidate.y)<pr.r+candidate.r+80))continue;
                props.push(candidate);
            }
            buffs.minari = B; pushText("バリケード！アイテム効果2倍", "#fc3", 50, -70);
            break;
        case 1: buffs.bell = B; pushText("覚醒！攻撃UP＆被ゲージ減", "#f96", 50, -70); break;   // ベルペット
        case 2: zones.push({ x, y, r: 250, life: 300, type: 'slow' }); pushText("スローエリア設置", "#08f", 50, -70); break;   // ラコ
        case 3: buffs.bani = B; pushText("興奮状態！被弾も白♡になる", "#f6a", 50, -70); break;   // バーニ
        case 4: {   // リウ: 周囲に中ダメージ
            const dmg = 60 * runMods.atkMul;
            enemies.forEach(en => { if(Math.hypot(en.x - x, en.y - y) < 300) en.hp -= dmg; });
            if(boss && Math.hypot(boss.x - x, boss.y - y) < 300) boss.hp -= dmg;
            pushText("女王の威圧！", "#fd5", 50, -70);
            break;
        }
        case 5: zones.push({ x, y, r: 250, life: 300, type: 'poison' }); pushText("毒沼を設置", "#3f6", 50, -70); break;   // アウネ
        case 6: {   // ヒロイベオ: ランダムな味方の爆発を2回発動
            if(depth > 2) break;   // 連鎖の暴走防止
            const others = party.filter(m => !m.dead && m.id !== 6);
            if(!others.length) { pushText("……(誰もいない)", "#888", 40, -70); break; }
            for(let k = 0; k < 2; k++) {
                const m = others[Math.floor(Math.random() * others.length)];
                pushText(`${m.e} の力を引き出した`, "#eee", 45, -70 - k * 20);
                executeBurst(m.id, x, y, depth + 1);
            }
            break;
        }
        case 7: {   // ぱふ先生: ランダムな味方の黒♡→白♡
            const cand = party.filter(m => !m.dead && m.black > 0);
            if(cand.length) {
                const m = cand[Math.floor(Math.random() * cand.length)];
                m.black--; m.white++;
                pushText(`${m.e} の黒♡が白♡に浄化された`, "#fff", 55, -70);
            } else pushText("浄化する黒♡がない", "#888", 40, -70);
            break;
        }
        case 8: buffs.mayuu = B; pushText("コスプレ変身！", "#f0f", 55, -70); break;   // マユゥ
        case 9: buffs.yuna = B; pushText("大サービス！撃破で必ず❤", "#ffd700", 50, -70); break;   // ユゥナリナ
        case 10: buffs.moko = B; pushText("ラブ全開！停止チャージ大UP", "#f6a", 50, -70); break;   // モコクン
        case 11:   // 瑞珠: 足元にダメージゾーン2つ
            zones.push({ x, y, r: 220, life: 300, type: 'damage', pow: 5 * runMods.atkMul });
            zones.push({ x: x + 120, y: y + (Math.random() - 0.5) * 160, r: 220, life: 300, type: 'damage', pow: 5 * runMods.atkMul });
            pushText("泥エステ開店", "#fa0", 50, -70);
            break;
    }
    updateMemberUI();
}

// ---------------- 快感ゲージ → 2色ハート ----------------
// ♡は♡、白黒同格 (差は爆発で消費できるかだけ)。白+黒の合算が上限に達したら離脱。
// 自力で100 → 白♡(爆発の弾薬)。敵に100 → 黒♡(篭絡・消せない)。
function addSex(p, amount, fromEnemy) {
    if(isOver || p.dead) return;
    if(fromEnemy) {
        if(invulnTimer > 0) return;
        let g = runMods.guardMul;
        if(p.pas === 'whiteGuard') g *= Math.max(0.4, 1 - p.white * 0.10);   // ベルペット: 白♡が多いほど被ゲージ減
        if(p.pas === 'contactGuard') g *= 0.6;                                // バーニ: 接触の被ゲージが少ない
        if(p.pas === 'contactWeak') g *= 1.5;                                 // ぱふ先生: 接触の被ゲージが多い(弱点)
        amount *= g;
        if(buffs.bani > 0 && p === party[activeIdx]) fromEnemy = false;       // バーニ爆発中: 被弾を白方向へ反転
        else { p.reaction='aversion';p.reactionUntil=frame+24; }
    }
    p.sex = Math.max(0, Math.min(100, p.sex + (fromEnemy ? -amount : amount)));
    if(p.sex >= 100) { p.sex = CONFIG.GAUGE_CENTER; gainHeart(p, false); }
    else if(p.sex <= 0) { p.sex = CONFIG.GAUGE_CENTER; gainHeart(p, true); }
}
function gainHeart(p, fromEnemy) {
    p.reaction=fromEnemy?'pain':'shy';p.reactionUntil=frame+36;
    if(fromEnemy) { p.black++; pushText("篭絡…黒♡+1", "#c6c", 40, -60); playSE('blackHeart'); }
    else { p.white++; pushText("♡+1 長押しで爆発", "#ff6", 32, -50); playSE('whiteHeart'); }
    if(p.white + p.black >= p.heartMax) { ravage(p); return; }
    updateMemberUI();
}
function ravage(p) {
    p.dead = true; p.sex = CONFIG.GAUGE_CENTER; p.white = 0; p.downX=worldX;p.downY=worldY;p.reaction='down';p.reactionUntil=Infinity;
    pushText(`${p.e} ♡が限界…蹂躙され離脱`, "#f33", 80, -70);
    playSE('ravage');
    const aliveIdx = party.findIndex(m => !m.dead);
    if(aliveIdx === -1) { endGame(); return; }
    if(party[activeIdx].dead) {
        activeIdx = aliveIdx;
        invulnTimer = Math.max(invulnTimer, CONFIG.RAVAGE_INVULN);   // 救済の無敵
    }
    updateMemberUI();
}

// ---------------- ミッション ----------------
function addMission() {
    const activeIds = missions.map(m => m.def.id);
    const pool = MISSION_DEFS.filter(d => !activeIds.includes(d.id));
    if(pool.length === 0) return;
    const def = pool[Math.floor(Math.random() * pool.length)];
    const times = missionDoneCount[def.id] || 0;
    const n = Math.ceil(def.n * Math.pow(1.5, times));
    missions.push({ def, n, prog: 0, startF: frame });
}
function missionEvent(id) {
    missions.forEach(m => { if(m.def.id === id) m.prog++; });
}
function updateMissions() {
    missions.forEach(m => { if(m.def.id === 'survive') m.prog = Math.floor((frame - m.startF) / 60); });
    for(let i = missions.length - 1; i >= 0; i--) {
        const m = missions[i];
        if(m.prog >= m.n) {
            missionDoneCount[m.def.id] = (missionDoneCount[m.def.id] || 0) + 1;
            if(m.def.likes) {
                for(let k=0;k<m.def.likes;k++) { const a=Math.PI*2*k/m.def.likes+Math.random()*.3,r=55+Math.random()*45; drops.push({x:worldX+Math.cos(a)*r,y:worldY+Math.sin(a)*r,t:'like',val:1}); }
                pushText(`ミッション達成 ❤×${m.def.likes}出現`, "#0ff", 60, -95);
            }
            else { addScore(m.def.score); pushText(`ミッション達成 +score`, "#0ff", 60, -95); }
            missions.splice(i, 1);
        }
    }
    while(missions.length < 3) addMission();
}

// ---------------- レベルアップ + 宅配ドロップ ----------------
function shuffled(items) {
    const a = items.slice();
    for(let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
}
function checkLevelUp() {
    if(isOver || paused || buzzFx || sessionLikes < nextLevelLikes) return;
    const pendingIds = new Set([
        ...deliveries.filter(d=>d.kind==='level').map(d=>d.targetId),
        ...drops.filter(d=>!d.dead&&d.t==='package'&&d.kind==='level').map(d=>d.targetId)
    ]);
    const pool = shuffled(party.filter(m=>!m.dead&&m.id!==6&&!pendingIds.has(m.id)));
    if(!pool.length && !party.some(m=>!m.dead&&m.black>0)) return;
    runLevel++;
    nextLevelLikes *= 2;
    levelDraft = pool.slice(0,Math.min(3,pool.length)).map(m=>({kind:'level',targetId:m.id}));
    if(Math.random()<.2 || !levelDraft.length) {
        const heal={kind:'heal'};
        if(levelDraft.length) levelDraft[Math.floor(Math.random()*levelDraft.length)]=heal; else levelDraft=[heal];
    }
    buzzFx = { l:36, maxL:36 };
}
function openLevelDraft() {
    paused = true; moveTouchId = null; gestures.clear(); joyEnd();
    document.getElementById('level-list').innerHTML = levelDraft.map((it,i) => {
        if(it.kind==='heal') return `<div class="draft-card" onclick="chooseLevelItem(${i})"><div class="draft-name">📦 回復便</div><div class="draft-desc">拾ったキャラの黒♡1→白♡1</div></div>`;
        const m=party.find(x=>x.id===it.targetId), next=nextLevelDesc(m);
        return `<div class="draft-card" onclick="chooseLevelItem(${i})"><div class="draft-name">${m.e} ${m.cn} Lv${m.lv}→${m.lv+1}</div><div class="draft-desc">${next}</div></div>`;
    }).join('');
    document.getElementById('level-scene').style.display = 'flex';
    playSE('level');
}
function chooseLevelItem(index) {
    const it = levelDraft[index];
    if(!it) return;
    deliveries.push({ ...it, timer:CONFIG.DELIVERY_DELAY });
    document.getElementById('level-scene').style.display = 'none';
    paused = false;
    pushText(`発送完了！📦を拾え`, "#0ff", 50, -80);
    checkLevelUp();
}
function nextLevelDesc(m){if(m.lv<10)return CHAR_LVUPS[m.id][m.lv-1].d;return '小強化（威力/サイズ/射程）';}
function levelUpMember(m){
    if(!m||m.id===6||m.dead)return;
    m.lv++;
    if(m.lv<=10) CHAR_LVUPS[m.id][m.lv-2].f(m.lvMods);
    else {
        const r=Math.floor(Math.random()*3);
        if(r===0)m.lvMods.powMul*=1.1;else if(r===1)m.lvMods.sizeMul*=1.15;else m.lvMods.rangeMul*=1.1;
    }
    updateMemberUI();
}
function grantEliteReward() {
    const pool=party.filter(m=>!m.dead&&m.id!==6);
    if(pool.length) levelUpMember(pool[Math.floor(Math.random()*pool.length)]);
}
function updateDeliveries() {
    for(let i = deliveries.length - 1; i >= 0; i--) {
        if(--deliveries[i].timer > 0) continue;
        const order = deliveries[i];
        deliveries.splice(i, 1);
        const a = Math.random() * Math.PI * 2;
        const dist = CONFIG.DELIVERY_DIST_MIN + Math.random() * (CONFIG.DELIVERY_DIST_MAX - CONFIG.DELIVERY_DIST_MIN);
        const x = worldX + Math.cos(a) * dist;
        const y = worldY + Math.sin(a) * dist;
        drops.push({ x, y, t:'package', kind:order.kind, targetId:order.targetId, val:0 });
        pushText("📦 届いた！拾いに行け", "#0ff", 40, -90);
        playSE('packageLand');
    }
}
// ---------------- メニュー (ミッション表示 + リトライ/リタイア) ----------------
function openMenu() {

// ---------------- スコア ----------------
function riskMult() {
    const p = party[activeIdx];
    return 1 + (p.white + p.black) * 0.15 + Math.abs(p.sex-CONFIG.GAUGE_CENTER) / 100 + (bloodTimer > 0 ? CONFIG.BLOOD_SCORE_BONUS : 0);
}
function addScore(base) { sessionScore += Math.round(base * riskMult()); }

// ---------------- 実効ステータス ----------------
function effSpd(p) { return p.spd * runMods.spdMul * (1+bondStacks*CONFIG.BOND_SPEED_PER); }
function effPickup(p) { return CONFIG.PICKUP_RADIUS + runMods.pickup + (p.pas === 'pickup' ? 60 : 0); }   // ミナリ: 回収範囲が広い

// ---------------- メインループ ----------------
let rafId = 0, lastTime = 0, acc = 0;
function loop(ts) {
    if(isOver) return;
    if(!lastTime) lastTime = ts;
    acc += Math.min(ts - lastTime, CONFIG.MAX_FRAME_MS);
    lastTime = ts;
    while(acc >= CONFIG.STEP_MS) {
        if(!paused) update();
        acc -= CONFIG.STEP_MS;
        if(isOver) return;
    }
    draw();
    updateHUD();
    rafId = requestAnimationFrame(loop);
}

function update() {
    frame++;
    const p = party[activeIdx];
    party.forEach((m, i) => {
        if(m.stun > 0) m.stun--;
        if(i !== activeIdx && !m.dead && m.white+m.black < m.heartMax-1) addSex(m,CONFIG.BENCH_CHARGE,false);
    });
    for(const k in buffs) if(buffs[k] > 0) buffs[k]--;
    if(bloodTimer > 0) bloodTimer--;
    if(invulnTimer > 0) invulnTimer--;
    if(switchTimer > 0) switchTimer--;
    if(burstCd > 0) burstCd--;
    if(burstFx && --burstFx.l <= 0) burstFx = null;
    if(ensembleFx && --ensembleFx.l <= 0) ensembleFx = null;
    if(buzzFx && --buzzFx.l <= 0) { buzzFx = null; openLevelDraft(); }
    updateDevices();
    updateZones();
    maxMult = Math.max(maxMult, riskMult());
    // 長押し中=爆発(白♡消費) / 停止=チャージ
    const holdingBurst = keyBurstHeld || [...gestures.entries()].some(([id, g]) => id !== moveTouchId && !g.moved && Date.now() - g.t >= CONFIG.TAP_MS);
    if(holdingBurst) tryBurst(p);
    const touchingEnemy = enemies.some(en => !en.dead && Math.hypot(en.x - worldX, en.y - worldY) < CONFIG.CONTACT_DIST);
    if(touchingEnemy) lastEnemyContactFrame = frame;
    const contactLocked = frame - lastEnemyContactFrame <= CONFIG.CONTACT_CHARGE_LOCK;
    const standing = moveVec.x === 0 && moveVec.y === 0 && Math.hypot(knockVec.x, knockVec.y) < 0.5;
    {
        const base = CONFIG.STAND_CHARGE * runMods.chargeMul * (1 + bondStacks * CONFIG.BOND_CHARGE_PER);
        let rate = 0;
        if(!contactLocked && standing) rate = base * (buffs.moko > 0 ? 3 : 1);        // モコクン爆発: 停止チャージ大UP
        else if(!contactLocked && p.pas === 'moveCharge') rate = base * 0.5;          // モコクン: 移動中もゲージ上昇
        if(!contactLocked && buffs.mayuu > 0) rate = Math.max(rate, base) * 2;        // コスプレ変身: 加速+移動中もチャージ
        if(rate > 0) addSex(p, rate, false);
    }
    if(frame % CONFIG.SURVIVAL_TICK === 0) {
        const bonus = CONFIG.SURVIVAL_BASE * (Math.floor(frame / 3600) + 1);
        addScore(bonus);
        pushText(`survive +${bonus}`, "#8ff", 25, -80);
    }
    updatePlayer(p);
    updateAttack(p);
    updateDelayedAttacks();
    updateBullets();
    spawnEnemies();
    replenishProps();
    updateEnemies(p);
    updateBoss(p);
    if(isOver) return;
    updateEnemyBullets(p);
    updateDrops(p);
    updateMissions();
    checkLevelUp();
    updateDeliveries();
    floatingTexts.forEach(ft => { ft.y--; if(--ft.l <= 0) ft.dead = true; });
    bullets = bullets.filter(b => !b.dead);
    enemyBullets = enemyBullets.filter(b => !b.dead);
    enemies = enemies.filter(e => !e.dead);
    props = props.filter(pr => !pr.dead);
    drops = drops.filter(d => !d.dead && Math.hypot(d.x-worldX,d.y-worldY)<=CONFIG.DROP_DESPAWN_RADIUS);
    floatingTexts = floatingTexts.filter(t => !t.dead);
}

function updatePlayer(p) {
    if(moveVec.x !== 0 || moveVec.y !== 0) { lastAim = { x: moveVec.x, y: moveVec.y }; if(Math.abs(moveVec.x)>.05)p.facing=moveVec.x>0?1:-1; }
    const heartSlow = Math.max(CONFIG.HEART_SLOW_MIN, 1 - (p.white + p.black) * CONFIG.HEART_SLOW_PER);
    const spd = effSpd(p) * heartSlow;
    const nx = worldX + moveVec.x * spd + knockVec.x;
    const ny = worldY + moveVec.y * spd + knockVec.y;
    knockVec.x *= 0.9; knockVec.y *= 0.9;
    const blockX = props.some(pr => !(Math.abs(worldX-pr.x)<pr.r+12&&Math.abs(worldY-pr.y)<pr.r+12) && Math.abs(nx-pr.x)<pr.r+12 && Math.abs(worldY-pr.y)<pr.r+12);
    const blockY = props.some(pr => !(Math.abs(worldX-pr.x)<pr.r+12&&Math.abs(worldY-pr.y)<pr.r+12) && Math.abs(worldX-pr.x)<pr.r+12 && Math.abs(ny-pr.y)<pr.r+12);
    if(!blockX) worldX = nx;
    if(!blockY) worldY = ny;
}

function updateAttack(p) {
    if(p.stun > 0) return;
    const a = p.atk;
    if(!a.freq) return;
    const cool = Math.max(5, Math.round(60 / (a.freq*p.lvMods.freqMul) * runMods.coolMul));
    if(frame % cool !== 0) return;
    // 自動照準: 最寄りの敵を狙う。射程内に敵がいなければ移動向き
    let target = null, best = Infinity;
    const scan = boss ? enemies.concat([boss]) : enemies;
    scan.forEach(t => {
        const d = Math.hypot(t.x - worldX, t.y - worldY);
        if(d < best) { best = d; target = t; }
    });
    let vx = lastAim.x, vy = lastAim.y;
    if(target && best < CONFIG.TARGET_RANGE) { vx = target.x - worldX; vy = target.y - worldY; }
    const ang = Math.atan2(vy, vx);
    const reach = a.rng * CONFIG.RANGE_UNIT * effRange(p) * p.lvMods.rangeMul * (['sweep','aura','zone'].includes(a.type) ? runMods.areaSizeMul*p.lvMods.areaMul : 1);
    const shots = 1 + runMods.extraAttacks + p.lvMods.extraShots;
    const shotAngle = k => ang + (k === 0 ? 0 : (k % 2 ? 1 : -1) * Math.ceil(k / 2) * CONFIG.EXTRA_SHOT_ANGLE);
    switch(a.type) {
        case 'line':
            for(let k=0;k<shots;k++) fireBullet(p,Math.cos(shotAngle(k)),Math.sin(shotAngle(k)));
            for(let r=1;r<p.lvMods.repeats;r++) delayedAttacks.push({type:'bullet',p,ang,shots,due:frame+r*CONFIG.EXTRA_AREA_DELAY});
            break;
        case 'fanRandom': {   // 前方扇範囲のランダム方向 (ミナリ・ぱふ先生)
            const ra = ang + (Math.random() - 0.5) * 1.2*p.lvMods.fanMul;
            for(let k=0;k<shots;k++) fireBullet(p, Math.cos(ra + shotAngle(k) - ang), Math.sin(ra + shotAngle(k) - ang));
            break;
        }
        case 'boomerang': for(let k=0;k<shots+p.lvMods.boomerangSpread;k++){const ba=k===0?ang:ang+Math.PI+(k-1)*.2;fireBullet(p,Math.cos(ba),Math.sin(ba),{boomerang:true});} break;
        case 'sweep':   // 薙ぎ払い/引っかき (ベルペット・ラコ)
            sweepFx.push({ ang, r: reach, l: 12 });
            hitArc(p, ang, reach, 1.05, worldX, worldY);
            scheduleAreaRepeats({ type:'arc', p, ang, reach, halfArc:1.05, x:worldX, y:worldY },p.lvMods.repeats-1);
            break;
        case 'aura':   // 360度ダメージゾーン (バーニ)
            sweepFx.push({ ang: 0, r: reach, l: 12, full: true });
            hitArc(p, 0, reach, Math.PI + 0.1, worldX, worldY);
            scheduleAreaRepeats({ type:'arc', p, ang:0, reach, halfArc:Math.PI + 0.1, x:worldX, y:worldY },p.lvMods.repeats-1);
            break;
        case 'zone':   // 足元に設置 (瑞珠)
            for(let zc=0;zc<p.lvMods.zoneCount;zc++) addDamageZone(p,worldX+zc*45,worldY);
            break;
    }
}
function scheduleAreaRepeats(data,extra=runMods.extraAttacks) {
    for(let k=1; k<=extra; k++) delayedAttacks.push({ ...data, due:frame + k * CONFIG.EXTRA_AREA_DELAY });
}
function addDamageZone(p,x=worldX,y=worldY) {
    const a = p.atk;
    zones.push({ x,y, r:a.zoneR*CONFIG.RANGE_UNIT*effRange(p)*runMods.areaSizeMul*p.lvMods.areaMul, life:(a.zoneLife+p.lvMods.zoneLifeAdd)*60, type:'damage', pow:effDmg(p) });
}
function updateDelayedAttacks() {
    delayedAttacks.filter(a => a.due <= frame).forEach(a => {
        if(a.type === 'bullet') {
            for(let k=0;k<a.shots;k++){const aa=a.ang+(k===0?0:(k%2?1:-1)*Math.ceil(k/2)*CONFIG.EXTRA_SHOT_ANGLE);fireBullet(a.p,Math.cos(aa),Math.sin(aa));}
        } else if(a.type === 'arc') {
            sweepFx.push({ ang:a.ang, r:a.reach, l:12, full:a.halfArc > Math.PI, x:a.x, y:a.y });
            hitArc(a.p, a.ang, a.reach, a.halfArc, a.x, a.y);
        } else {
            const dmg = effDmg(a.p), scan = boss ? enemies.concat([boss]) : enemies;
            scan.forEach(en=>{if(Math.hypot(en.x-a.x,en.y-a.y)<=a.reach){en.hp-=dmg;applyOnHit(a.p,en);}});
        }
        a.dead = true;
    });
    delayedAttacks = delayedAttacks.filter(a => !a.dead);
}
function hitArc(p, ang, reach, halfArc, ox = worldX, oy = worldY) {
    const dmg = effDmg(p);
    const scan = boss ? enemies.concat([boss]) : enemies;
    scan.forEach(en => {
        const d = Math.hypot(en.x - ox, en.y - oy);
        if(d > reach + 20) return;
        let da = Math.atan2(en.y - oy, en.x - ox) - ang;
        while(da > Math.PI) da -= Math.PI * 2; while(da < -Math.PI) da += Math.PI * 2;
        if(Math.abs(da) > halfArc) return;
        en.hp -= dmg;
        applyOnHit(p,en);
    });
}
function applyOnHit(p, en) {
    if(p.onHit==='slow'){en.slowT=Math.round(120*p.lvMods.slowTimeMul);en.slowFactor=p.lvMods.slowFactor;}
    if(p.onHit==='poison'){en.poisonT=180;en.poisonMul=p.lvMods.poisonMul;en.poisonOwner=p;}
}

function fireBullet(p, vx, vy, opts = {}) {
    const d = Math.hypot(vx, vy) || 1;
    const a = p.atk;
    const spd = CONFIG.BULLET_SPEED * runMods.bulletSpdMul;
    const lifeF=Math.max(6,Math.round(a.rng*CONFIG.RANGE_UNIT*effRange(p)*p.lvMods.rangeMul/spd));
    bullets.push({
        x: worldX, y: worldY, vx: vx/d * spd, vy: vy/d * spd,
        l: opts.boomerang ? lifeF * 4 : lifeF, out: lifeF,
        size: CONFIG.BULLET_SIZE * runMods.sizeMul*p.lvMods.sizeMul * (0.7 + a.pow * 0.05),
        dmg: effDmg(p), owner: p,
        pierce:!!a.pierce||p.lvMods.pierce, bounce:(a.bounce||0)+p.lvMods.bounceAdd,
        boomerang:!!opts.boomerang, overProp:!!a.overProp, hit:(a.pierce||p.lvMods.pierce)?[]:null
    });
}

function updateZones() {
    zones.forEach(z => {
        z.life--;
        if(z.type === 'damage' && z.life % 60 === 0) {
            enemies.forEach(en => { if(Math.hypot(en.x - z.x, en.y - z.y) < z.r) en.hp -= z.pow; });
            if(boss && Math.hypot(boss.x - z.x, boss.y - z.y) < z.r) boss.hp -= z.pow;
        }
        if(z.type === 'poison' && z.life % 20 === 0) {
            enemies.forEach(en => { if(Math.hypot(en.x - z.x, en.y - z.y) < z.r) en.poisonT = Math.max(en.poisonT || 0, 90); });
            if(boss&&Math.hypot(boss.x-z.x,boss.y-z.y)<z.r)boss.poisonT=Math.max(boss.poisonT||0,90);
        }
        if(z.life <= 0) z.dead = true;
    });
    zones = zones.filter(z => !z.dead);
}

function updateBullets() {
    const scan = boss ? [boss] : enemies;
    bullets.forEach(b => {
        if(b.boomerang && b.out >= 0 && --b.out < 0) b.hit = [];   // 折り返しで再ヒット可能に
        if(b.boomerang && b.out < 0) {   // 帰り: プレイヤーの手元へ戻る
            const dx = worldX - b.x, dy = worldY - b.y, dd = Math.hypot(dx, dy) || 1;
            if(dd < 24) { b.dead = true; return; }
            const sp = Math.hypot(b.vx, b.vy);
            b.vx = dx/dd * sp; b.vy = dy/dd * sp;
        } else if(runMods.homing > 0 && scan.length) {
            let tx, ty, bd = Infinity;
            scan.forEach(e => { const d = Math.hypot(e.x - b.x, e.y - b.y); if(d < bd) { bd = d; tx = e.x; ty = e.y; } });
            if(tx !== undefined) {
                const cur = Math.atan2(b.vy, b.vx);
                let da = Math.atan2(ty - b.y, tx - b.x) - cur;
                while(da > Math.PI) da -= Math.PI * 2; while(da < -Math.PI) da += Math.PI * 2;
                const turn = CONFIG.HOMING_TURN * runMods.homing;
                const na = cur + Math.max(-turn, Math.min(turn, da));
                const sp = Math.hypot(b.vx, b.vy);
                b.vx = Math.cos(na) * sp; b.vy = Math.sin(na) * sp;
            }
        }
        b.x += b.vx; b.y += b.vy;
        if(!b.boomerang && !b.overProp && props.some(pr => Math.abs(b.x-pr.x)<pr.r+b.size && Math.abs(b.y-pr.y)<pr.r+b.size)) b.dead = true;
        if(--b.l <= 0) b.dead = true;
    });
}

function replenishProps(force=false) {
    if(!force && frame % CONFIG.PROP_REFRESH_INTERVAL !== 0) return;
    props = props.filter(pr => Math.hypot(pr.x-worldX,pr.y-worldY)<=CONFIG.PROP_DESPAWN_RADIUS);
    const target=Math.round(Math.PI*CONFIG.PROP_FIELD_RADIUS**2/(CONFIG.PROP_CELL**2));
    let tries=0;
    while(props.length<target && tries++<target*12) {
        const a=Math.random()*Math.PI*2, r=CONFIG.PROP_SAFE_DIST+Math.sqrt(Math.random())*(CONFIG.PROP_FIELD_RADIUS-CONFIG.PROP_SAFE_DIST);
        const x=worldX+Math.cos(a)*r, y=worldY+Math.sin(a)*r, candidate=randomProp(x,y);
        if(Math.hypot(candidate.x-worldX,candidate.y-worldY)<candidate.r+50)continue;
        if(props.some(pr=>Math.hypot(pr.x-x,pr.y-y)<pr.r+candidate.r+80)) continue;
        props.push(candidate);
    }
}

function spawnEnemies() {
    if(--spawnTimer > 0) return;
    const t = frame / 60;
    spawnTimer = Math.max(CONFIG.SPAWN_MIN_INTERVAL, CONFIG.ENEMY_SPAWN_INTERVAL - Math.floor(t / 5));
    const maxEnemies = Math.min(CONFIG.ENEMY_MAX_CAP, CONFIG.ENEMY_MAX + Math.floor(t / 45));
    if(enemies.length >= maxEnemies) return;
    const type = pickEnemyType(t);
    const count = Math.min(type.pack[0] + Math.floor(Math.random() * (type.pack[1] - type.pack[0] + 1)), maxEnemies - enemies.length);
    const angle = Math.random() * Math.PI * 2;
    for(let i = 0; i < count; i++) {
        const a = angle + (Math.random() - 0.5) * 0.6;
        enemies.push({
            ...type, uid: enemyUid++,
            x: worldX + Math.cos(a) * (CONFIG.ENEMY_SPAWN_DIST + Math.random() * 80),
            y: worldY + Math.sin(a) * (CONFIG.ENEMY_SPAWN_DIST + Math.random() * 80),
            hp:type.hp,maxHp:type.hp,phase:Math.floor(Math.random()*600),slowT:0,poisonT:0,rhinoState:type.rhino?'charge':null,rhinoT:type.rhino?30:0,
            stuckDist:0,stuckFrames:0
        });
    }
}
function pickEnemyType(sec) {
    const weights=sec<60?[45,35,20,0,0,0]:sec<120?[35,25,15,25,0,0]:sec<180?[25,20,15,20,20,0]:[15,15,15,20,20,15];
    const total=weights.reduce((a,b)=>a+b,0);
    let r = Math.random() * total;
    for(let i=0;i<ENEMY_TYPES.length;i++)if((r-=weights[i])<0)return ENEMY_TYPES[i];
    return ENEMY_TYPES[0];
}

function updateEnemies(p) {
    enemies.forEach(en => {
        const dx = worldX - en.x, dy = worldY - en.y, dist = Math.hypot(dx, dy) || 1;
        // 状態異常: スロー(ラコ)・毒(アウネ)・スローゾーン
        let esp = en.spd;
        if(en.slowT > 0) { en.slowT--; esp *= en.slowFactor||.5; }
        if(zones.some(z => z.type === 'slow' && Math.hypot(en.x - z.x, en.y - z.y) < z.r)) esp *= 0.5;
        if(en.poisonT > 0) { en.poisonT--; if(en.poisonT%30===0) en.hp-=4*(en.poisonMul||1); }
        // 敵は弾を撃たない。接触と包囲の圧のみ。障害物は通れない(隠れられる)
        let mvx=dx/dist*esp,mvy=dy/dist*esp;
        if(en.rhino){
            if(en.rhinoState==='charge'){mvx=mvy=0;if(--en.rhinoT<=0){en.rhinoState='dash';en.rhinoT=45;en.dashX=dx/dist;en.dashY=dy/dist;}}
            else {mvx=en.dashX*6;mvy=en.dashY*6;if(--en.rhinoT<=0){en.rhinoState='charge';en.rhinoT=30;}}
        }
        if(en.type === 1) {
            const w = Math.sin((frame + en.phase) * 0.08) * 2;
            mvx += (-dy/dist) * w; mvy += (dx/dist) * w;
        }
        const oldX=en.x,oldY=en.y,nx=en.x+mvx,ny=en.y+mvy;
        const blockX=props.some(pr=>!(Math.abs(en.x-pr.x)<pr.r+15&&Math.abs(en.y-pr.y)<pr.r+15)&&Math.abs(nx-pr.x)<pr.r+15&&Math.abs(en.y-pr.y)<pr.r+15),blockY=props.some(pr=>!(Math.abs(en.x-pr.x)<pr.r+15&&Math.abs(en.y-pr.y)<pr.r+15)&&Math.abs(en.x-pr.x)<pr.r+15&&Math.abs(ny-pr.y)<pr.r+15);
        if(!blockX)en.x=nx;if(!blockY)en.y=ny;
        if(en.rhino&&en.rhinoState==='dash'&&(blockX||blockY)){en.rhinoState='charge';en.rhinoT=30;}
        en.stuckDist=(en.stuckDist||0)+Math.hypot(en.x-oldX,en.y-oldY);en.stuckFrames=(en.stuckFrames||0)+1;
        const stuckLimit=en.slowT>0?CONFIG.STUCK_SLOW_FRAMES:CONFIG.STUCK_FRAMES;
        if(en.stuckFrames>=stuckLimit){
            const sx=en.x-worldX+viewportW/2,sy=en.y-worldY+viewportH/2;
            const off=sx<-CONFIG.STUCK_SCREEN_MARGIN||sx>viewportW+CONFIG.STUCK_SCREEN_MARGIN||sy<-CONFIG.STUCK_SCREEN_MARGIN||sy>viewportH+CONFIG.STUCK_SCREEN_MARGIN;
            if(en.stuckDist<CONFIG.STUCK_DISTANCE&&dist>=CONFIG.CONTACT_DIST&&off){const a=Math.random()*Math.PI*2;en.x=worldX+Math.cos(a)*CONFIG.ENEMY_SPAWN_DIST;en.y=worldY+Math.sin(a)*CONFIG.ENEMY_SPAWN_DIST;}
            en.stuckDist=0;en.stuckFrames=0;
        }

        if(invulnTimer <= 0 && dist < CONFIG.CONTACT_DIST && frame % CONFIG.CONTACT_INTERVAL === 0) {
            knockVec = { x:-dx/dist*CONFIG.CONTACT_KNOCK, y:-dy/dist*CONFIG.CONTACT_KNOCK };
            pushText("ああっ", "#f0f", 30);
            addSex(p,en.sex||CONFIG.CONTACT_SEX,true);
            invulnTimer = Math.max(invulnTimer, CONFIG.CONTACT_INVULN);
            playSE('hit');
        }
        bullets.forEach(b => {
            if(b.dead || Math.hypot(b.x - en.x, b.y - en.y) >= 30 + b.size) return;
            if(b.pierce) { if(b.hit.includes(en.uid)) return; b.hit.push(en.uid); }
            en.hp -= b.dmg;
            applyOnHit(b.owner, en);
            if(b.bounce > 0) {   // ぱふ先生: ヒットすると1回跳ねる
                b.bounce--;
                const ra = Math.random() * Math.PI * 2, sp = Math.hypot(b.vx, b.vy);
                b.vx = Math.cos(ra) * sp; b.vy = Math.sin(ra) * sp;
                b.l = b.out;
            } else if(!b.pierce) b.dead = true;
        });
        if(en.hp <= 0 && !en.dead) {
            en.dead = true; killCount++;
            if(en.poisonT>0&&en.poisonOwner?.lvMods.poisonInfect) enemies.forEach(o=>{if(!o.dead&&o!==en&&Math.hypot(o.x-en.x,o.y-en.y)<140)applyOnHit(en.poisonOwner,o);});
            addScore(en.score);
            missionEvent('kill_any');
            if(en.type === 0) missionEvent('kill_wolf');
            if(Math.random()<CONFIG.DROP_BLOOD_RATE) drops.push({ x:en.x, y:en.y, t:'blood', val:0 });
            else drops.push({ x:en.x, y:en.y, t:'like', val:1 });
        }
    });
}

function updateBoss(p) {
    const norma = CONFIG.BOSS_NORMA * (bossKills + 1);
    if(!boss && killCount >= norma) {
        const hp=CONFIG.BOSS_HP;
        boss = {
            x:worldX, y:worldY-400,
            hp,maxHp:hp,uid:'B'+bossKills,slowT:0,poisonT:0,stuckDist:0,stuckFrames:0
        };
        pushText("エリート出現！宝箱を奪え", "#f80", 80, -100);
    }
    if(!boss) return;
    const dx = worldX - boss.x, dy = worldY - boss.y, dist = Math.hypot(dx, dy) || 1;
    let bsp=CONFIG.BOSS_SPD;if(boss.slowT>0){boss.slowT--;bsp*=boss.slowFactor||.5;}if(zones.some(z=>z.type==='slow'&&Math.hypot(boss.x-z.x,boss.y-z.y)<z.r))bsp*=.5;if(boss.poisonT>0){boss.poisonT--;if(boss.poisonT%30===0)boss.hp-=4*(boss.poisonMul||1);}
    const bnx=boss.x+dx/dist*bsp,bny=boss.y+dy/dist*bsp;
    const bossBlockX=props.some(pr=>!(Math.abs(boss.x-pr.x)<pr.r+35&&Math.abs(boss.y-pr.y)<pr.r+35)&&Math.abs(bnx-pr.x)<pr.r+35&&Math.abs(boss.y-pr.y)<pr.r+35);
    const bossBlockY=props.some(pr=>!(Math.abs(boss.x-pr.x)<pr.r+35&&Math.abs(boss.y-pr.y)<pr.r+35)&&Math.abs(boss.x-pr.x)<pr.r+35&&Math.abs(bny-pr.y)<pr.r+35);
    const oldBossX=boss.x,oldBossY=boss.y;if(!bossBlockX)boss.x=bnx;if(!bossBlockY)boss.y=bny;
    boss.stuckDist+=Math.hypot(boss.x-oldBossX,boss.y-oldBossY);boss.stuckFrames++;
    const bossStuckLimit=boss.slowT>0?CONFIG.STUCK_SLOW_FRAMES:CONFIG.STUCK_FRAMES;
    if(boss.stuckFrames>=bossStuckLimit){const sx=boss.x-worldX+viewportW/2,sy=boss.y-worldY+viewportH/2,off=sx<-CONFIG.STUCK_SCREEN_MARGIN||sx>viewportW+CONFIG.STUCK_SCREEN_MARGIN||sy<-CONFIG.STUCK_SCREEN_MARGIN||sy>viewportH+CONFIG.STUCK_SCREEN_MARGIN;if(boss.stuckDist<CONFIG.STUCK_DISTANCE&&dist>=CONFIG.BOSS_CONTACT_DIST&&off){const a=Math.random()*Math.PI*2;boss.x=worldX+Math.cos(a)*CONFIG.ENEMY_SPAWN_DIST;boss.y=worldY+Math.sin(a)*CONFIG.ENEMY_SPAWN_DIST;}boss.stuckDist=0;boss.stuckFrames=0;}
    if(invulnTimer <= 0 && dist < CONFIG.BOSS_CONTACT_DIST && frame % CONFIG.CONTACT_INTERVAL === 0) {
        knockVec={x:-dx/dist*CONFIG.CONTACT_KNOCK,y:-dy/dist*CONFIG.CONTACT_KNOCK};
        pushText("ぐあぁっ！", "#f00", 40, -50);
        addSex(p,CONFIG.CONTACT_SEX,true);
        invulnTimer = Math.max(invulnTimer, CONFIG.CONTACT_INVULN);
        playSE('hit');
    }
    bullets.forEach(b => {
        if(b.dead || Math.hypot(b.x - boss.x, b.y - boss.y) >= 60) return;
        if(b.pierce) { if(b.hit.includes(boss.uid)) return; b.hit.push(boss.uid); }
        boss.hp -= b.dmg;
        applyOnHit(b.owner,boss);
        if(b.bounce>0){b.bounce--;const a=Math.random()*Math.PI*2,sp=Math.hypot(b.vx,b.vy);b.vx=Math.cos(a)*sp;b.vy=Math.sin(a)*sp;b.l=b.out;}else if(!b.pierce)b.dead=true;
    });
    if(boss.hp <= 0) {
        for(let k=0; k<5; k++) drops.push({ x:boss.x+(Math.random()-0.5)*140, y:boss.y+(Math.random()-0.5)*140, t:'like', val:1 });
        drops.push({ x:boss.x, y:boss.y, t:'chest', val:0 });
        addScore(CONFIG.SCORE_BOSS);
        bossKills++;
        boss = null;
        invulnTimer = CONFIG.KILL_INVULN;
        pushText("エリート撃破！🎁を拾え", "#ff0", 90, -100);
    }
}

function updateEnemyBullets(p) {
    enemyBullets.forEach(eb => {
        eb.x += eb.vx; eb.y += eb.vy;
        if(invulnTimer <= 0 && !eb.dead && Math.hypot(eb.x - worldX, eb.y - worldY) < 15 + eb.size) {
            eb.dead = true;
            pushText("あっ", "#f0f", 30);
            addSex(p, CONFIG.ENEMY_BULLET_SEX, true);
        }
        if(--eb.l <= 0) eb.dead = true;
    });
}

function updateDrops(p) {
    const pickupR = effPickup(p);
    drops.forEach(d => {
        if(d.dead || Math.hypot(d.x - worldX, d.y - worldY) >= pickupR) return;
        d.dead = true;
        const itemMul = buffs.minari > 0 ? 2 : 1;   // ミナリ爆発: アイテム効果2倍
        if(d.t === 'like') {
            sessionLikes += d.val * itemMul;
            missionEvent('likes');
            pushText(`❤+${d.val * itemMul}`, "#ff0", 30, -60);
            playSE('coin');
        } else if(d.t === 'package') {
            if(d.kind==='level') {
                const m=party.find(m=>m.id===d.targetId), desc=m ? nextLevelDesc(m) : '';
                levelUpMember(m);
                if(m) pushText(`📦 ${m.cn} Lv${m.lv}: ${desc}`, "#0ff", 55, -70);
            } else if(d.kind==='heal') {
                if(p.black>0) { p.black--; p.white++; updateMemberUI(); pushText(`📦 ${p.cn} 黒♡→白♡`, "#fff", 55, -70); }
                else pushText(`📦 ${p.cn} 回復効果なし`, "#888", 40, -70);
            }
            playSE('packageGet');
        } else if(d.t === 'chest') {
            grantEliteReward();
            playSE('packageGet');
        } else {
            // 🩸: 操作キャラから交代順に減衰分配 ＋ 20秒間スコア倍率+0.3
            CONFIG.BLOOD_PARTY_GAIN.forEach((gain,offset)=>{
                const m=party[(activeIdx+offset)%party.length];
                if(m&&!m.dead)addSex(m,gain*itemMul,false);
            });
            bloodTimer = CONFIG.BLOOD_SCORE_TIME;
            pushText("快感チャージ +♡", "#f0f", 30, -60);
            playSE('blood');
        }
    });
}

function pushText(t, c, l, dy = -40) {
    if(!t.startsWith('発送完了')&&!t.startsWith('📦')) return;
    floatingTexts.push({ x: viewportW/2, y: viewportH/2 + dy, t, c, l });
}

// ---------------- 描画 ----------------
function draw() {
    const cx = viewportW/2, cy = viewportH/2;
    ctx.fillStyle = "#fdf6ec"; ctx.fillRect(0, 0, viewportW, viewportH);
    ctx.strokeStyle = "rgba(74,220,255,.18)"; ctx.lineWidth = 1;
    const gridX=(((-worldX+cx)%CONFIG.GRID_SIZE)+CONFIG.GRID_SIZE)%CONFIG.GRID_SIZE;
    const gridY=(((-worldY+cy)%CONFIG.GRID_SIZE)+CONFIG.GRID_SIZE)%CONFIG.GRID_SIZE;
    for(let x=gridX;x<viewportW;x+=CONFIG.GRID_SIZE){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,viewportH);ctx.stroke();}
    for(let y=gridY;y<viewportH;y+=CONFIG.GRID_SIZE){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(viewportW,y);ctx.stroke();}

    // 設置ゾーン (スロー=青 / 毒=緑 / ダメージ=橙)
    zones.forEach(z => {
        ctx.globalAlpha = 0.13 + 0.05 * Math.sin(frame * 0.1);
        ctx.fillStyle = z.type === 'slow' ? '#08f' : (z.type === 'poison' ? '#3f6' : '#f80');
        ctx.beginPath(); ctx.arc(z.x-worldX+cx, z.y-worldY+cy, z.r, 0, 7); ctx.fill();
        ctx.globalAlpha = 1;
    });
    ctx.textAlign = "center";
    props.forEach(pr => {
        ctx.font=`${Math.max(24,Math.round(pr.r*0.9))}px Arial`;
        ctx.fillText(pr.t,pr.x-worldX+cx,pr.y-worldY+cy+pr.r*0.3);
    });
    party.filter(m=>m.dead&&m.downX!==undefined).forEach(m=>{
        const dx=m.downX-worldX+cx,dy=m.downY-worldY+cy;
        if(!drawCharacterSprite(ctx,m,'down',dx,dy+10,90,.75,false)){ctx.globalAlpha=.55;ctx.font='44px Arial';ctx.fillText('💀',dx,dy);ctx.globalAlpha=1;}
    });
    const bob = Math.sin(frame * 0.1) * 5;
    ctx.font = "24px Arial";
    drops.forEach(d => ctx.fillText(d.t === 'like' ? '❤' : (d.t === 'package' ? '📦' : (d.t === 'chest' ? CONFIG.ELITE_CHEST_ICON : '🩸')), d.x-worldX+cx, d.y-worldY+cy+bob));
    ctx.fillStyle = "#ff3f8f";
    bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x-worldX+cx, b.y-worldY+cy, b.size, 0, 7); ctx.fill(); });
    // 薙ぎ払い=塗りの扇 / オーラ=自分中心の円 (攻撃範囲がそのまま見える)
    sweepFx.forEach(s => {
        s.l--;
        const a = Math.max(0, s.l / 12);
        const sx = s.x === undefined ? cx : s.x-worldX+cx, sy = s.y === undefined ? cy : s.y-worldY+cy;
        if(s.full) {
            ctx.fillStyle = "#ff5fa2"; ctx.globalAlpha = a * 0.18;
            ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, 7); ctx.fill();
            ctx.strokeStyle = "#9b55d4"; ctx.globalAlpha = a * 0.75; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, 7); ctx.stroke();
        } else {
            ctx.fillStyle = "#ff5fa2"; ctx.globalAlpha = a * 0.26;
            ctx.beginPath(); ctx.moveTo(sx, sy);
            ctx.arc(sx, sy, s.r, s.ang - 1.05, s.ang + 1.05);
            ctx.closePath(); ctx.fill();
        }
        ctx.globalAlpha = 1;
    });
    sweepFx = sweepFx.filter(s => s.l > 0);
    ctx.fillStyle = "#eee"; ctx.font = "30px Arial";
    enemies.forEach(en => {
        const ex = en.x-worldX+cx, ey = en.y-worldY+cy;
        ctx.fillText(en.icon, ex, ey+10);
        if(en.slowT>0||en.poisonT>0||(en.rhino&&en.rhinoState==='charge')) {
            ctx.font = "12px Arial";
            ctx.fillText((en.slowT>0?'🐌':'')+(en.poisonT>0?'☠':'')+(en.rhino&&en.rhinoState==='charge'?'⚡':''),ex,ey-22);
            ctx.font = "30px Arial";
        }
    });
    if(boss) {
        const bx=boss.x-worldX+cx, by=boss.y-worldY+cy;
        ctx.font = "80px Arial"; ctx.fillText(CONFIG.ELITE_ICON, bx, by+30);
    }
    ctx.fillStyle = "#ff3333";
    enemyBullets.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x-worldX+cx, eb.y-worldY+cy, eb.size, 0, 7); ctx.fill(); });

    // 置き土産デバイス (その場に残って撃ち続ける)
    devices.forEach(d => {
        const dx = d.x - worldX + cx, dy = d.y - worldY + cy;
        const dm=party.find(m=>m.id===d.id);
        if(!dm||!drawCharacterSprite(ctx,dm,'emotion_overflow',dx,dy+28,90,.55,dm.facing>0)){ctx.globalAlpha=.55;ctx.font="40px Arial";ctx.fillText(d.e,dx,dy+12);}
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = "#fa0"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(dx, dy, 30, 0, 7); ctx.stroke();
        // 次の爆発までのCTアーク
        ctx.globalAlpha = 0.9; ctx.strokeStyle = "#ff6";
        const dprog = Math.max(0, Math.min(1, 1 - d.timer / burstCooldown()));
        ctx.beginPath(); ctx.arc(dx, dy, 30, -Math.PI/2, -Math.PI/2 + dprog * Math.PI * 2); ctx.stroke();
        ctx.font = "12px sans-serif"; ctx.fillStyle = "#ff6";
        ctx.fillText(`♥×${d.left}`, dx, dy + 32);
        ctx.globalAlpha = 1;
    });
    if(burstFx) {
        const prog = 1 - burstFx.l / burstFx.maxL;
        const bx = (burstFx.x ?? worldX) - worldX + cx, by = (burstFx.y ?? worldY) - worldY + cy;
        ctx.strokeStyle = burstFx.c; ctx.lineWidth = 6;
        ctx.globalAlpha = 1 - prog;
        ctx.beginPath(); ctx.arc(bx, by, burstFx.r * (0.3 + prog * 0.7), 0, 7); ctx.stroke();
        ctx.globalAlpha = 1;
    }

    const p = party[activeIdx];
    // 綱引きゲージ: 足元バー中央が中立。左=黒、右=白
    const standing = moveVec.x === 0 && moveVec.y === 0 && Math.hypot(knockVec.x, knockVec.y) < 0.5;
    const gaugeX=cx-35,gaugeY=cy+47,edgeDanger=p.sex<=10||p.sex>=90;
    ctx.globalAlpha=edgeDanger?(0.45+0.55*Math.abs(Math.sin(frame*.25))):(standing?.95:.85);
    ctx.save();ctx.beginPath();ctx.roundRect(gaugeX,gaugeY,70,6,3);ctx.clip();
    ctx.fillStyle="#b48cff";ctx.fillRect(gaugeX,gaugeY,35,6);
    ctx.fillStyle="#ffd94a";ctx.fillRect(cx,gaugeY,35,6);ctx.restore();
    ctx.beginPath();ctx.roundRect(gaugeX,gaugeY,70,6,3);ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle="#fff";ctx.fillRect(cx-1,gaugeY-2,2,10);
    ctx.fillStyle=edgeDanger?"#ff3b3b":"#ffef5a";ctx.fillRect(gaugeX+p.sex*.7-2,gaugeY-3,4,12);
    ctx.globalAlpha = 1;
    // 白♡持ちの外周リング: CT中=回復アークで残り時間を可視化 / 準備完了=黄色の脈動
    if(p.white > 0) {
        if(burstCd > 0) {
            ctx.strokeStyle = "#555"; ctx.lineWidth = 3; ctx.globalAlpha = 0.5;
            ctx.beginPath(); ctx.arc(cx, cy, 61, 0, 7); ctx.stroke();
            ctx.strokeStyle = "#fd5"; ctx.globalAlpha = 0.9;
            const prog = 1 - burstCd / burstCooldown();
            ctx.beginPath(); ctx.arc(cx, cy, 61, -Math.PI/2, -Math.PI/2 + prog * Math.PI * 2); ctx.stroke();
        } else {
            ctx.strokeStyle = "#ff0"; ctx.lineWidth = 3;
            ctx.globalAlpha = 0.4 + Math.sin(frame * 0.3) * 0.25;
            ctx.beginPath(); ctx.arc(cx, cy, 61 + Math.sin(frame * 0.15) * 4, 0, 7); ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }
    if(invulnTimer <= 0 || frame % 10 < 5) {
        if(!drawPartyCharacter(ctx,p,cx,cy+30,90,1)){ctx.fillStyle="#eee";ctx.font="60px Arial";ctx.fillText(p.stun>0?"😫":p.e,cx,cy);}
    }
    // 頭上のハート列 (白=爆発の弾薬 / 黒=篭絡デバフ)
    if(p.white + p.black > 0) {
        ctx.font = "16px Arial"; ctx.textAlign = "center";
        const total = p.white + p.black, startX = cx - (total - 1) * 7;
        for(let h = 0; h < total; h++) {
            ctx.fillStyle = h < p.white ? "#ff5" : "#927";
            ctx.strokeStyle="#fff";ctx.lineWidth=4;ctx.strokeText("♥",startX+h*14,cy-68);ctx.fillText("♥", startX + h * 14, cy - 68);
        }
    }

    // 宅配📦の方向を画面端の矢印で示す (画面外にある時)
    const edge = Math.min(viewportW, viewportH) / 2 - 44;
    drops.forEach(d => {
        if(d.t !== 'package' || d.dead) return;
        const sx = d.x - worldX + cx, sy = d.y - worldY + cy;
        if(sx > 12 && sx < viewportW - 12 && sy > 12 && sy < viewportH - 12) return;
        const ang = Math.atan2(sy - cy, sx - cx);
        const ex = cx + Math.cos(ang) * edge, ey = cy + Math.sin(ang) * edge;
        ctx.save(); ctx.translate(ex, ey); ctx.rotate(ang);
        ctx.fillStyle = "#ff3f8f";
        ctx.beginPath(); ctx.moveTo(16, 0); ctx.lineTo(-8, -10); ctx.lineTo(-8, 10); ctx.closePath(); ctx.fill();
        ctx.restore();
        ctx.fillStyle = "#ff3f8f"; ctx.font = "18px Arial"; ctx.textAlign = "center";
        ctx.fillText("📦", ex - Math.cos(ang) * 24, ey - Math.sin(ang) * 24 + 6);
    });

    ctx.font = "bold 20px sans-serif";
    floatingTexts.forEach(ft => { ctx.strokeStyle="#fff";ctx.lineWidth=5;ctx.strokeText(ft.t,ft.x,ft.y);ctx.fillStyle=ft.c;ctx.fillText(ft.t, ft.x, ft.y); });
}

// ---------------- HUD ----------------
function updateHUD() {
    const p = party[activeIdx];
    // ハート表示 (白=爆発の弾薬 / 黒=篭絡デバフ / 灰=空き)
    let hd = '';
    for(let h = 0; h < p.heartMax; h++) {
        const col = h < p.white ? '#ffd94a' : (h < p.white + p.black ? '#9b63c5' : '#c9bec6');
        hd += `<span style="color:${col}">♥</span>`;
    }
    document.getElementById('heart-display').innerHTML = hd;
    // バフ/CTのアイコンチップ (💥=爆発CT残り)
    let bd = '';
    if(burstCd > 0) bd += `<span class="buff-chip">💥${Math.ceil(burstCd / 60)}s</span>`;
    bd += `<span class="buff-chip">💞×${bondStacks}</span>`;
    for(const k in buffs) if(buffs[k] > 0) bd += `<span class="buff-chip" title="${BUFF_META[k].n}">${BUFF_META[k].i}${Math.ceil(buffs[k] / 60)}s</span>`;
    document.getElementById('buff-display').innerHTML = bd;
    const prevLevelLikes=runLevel===0?0:nextLevelLikes/2;
    const levelSpan = Math.max(1, nextLevelLikes-prevLevelLikes);
    const levelProg = buzzFx ? 1 : Math.max(0,Math.min(1,(sessionLikes-prevLevelLikes)/levelSpan));
    document.getElementById('level-progress-text').innerText = `Lv${runLevel}　❤${sessionLikes}/${nextLevelLikes}`;
    document.getElementById('level-progress-fill').style.width = `${levelProg*100}%`;
    const buzzEl=document.getElementById('buzz-banner');
    buzzEl.style.display=buzzFx?'flex':'none';
    if(buzzFx) buzzEl.style.opacity=String(Math.min(1,buzzFx.l/10));
    const ensembleEl = document.getElementById('ensemble-banner');
    ensembleEl.style.display = ensembleFx ? 'flex' : 'none';
    if(ensembleFx) {
        ensembleEl.innerText = ensembleFx.text;
        ensembleEl.style.fontSize = `${34 + ensembleFx.people * 8}px`;
        ensembleEl.style.color = ({2:'#1598ba',3:'#a97900',4:'#d92370'})[ensembleFx.people] || '#4a3a48';
        ensembleEl.style.background = `rgba(255,0,180,${0.18 * ensembleFx.l / ensembleFx.maxL})`;
    }

    const mult = riskMult();
    const sv = document.getElementById('score-val'), sm = document.getElementById('score-mult');
    sv.innerText = sessionScore.toLocaleString();
    const glow = mult >= CONFIG.GLOW_MULT;
    sv.style.color = glow ? '#f0f' : '#fff';
    sv.style.textShadow = glow ? '0 0 10px #f0f' : 'none';
    sm.innerText = `x${mult.toFixed(1)}${bloodTimer > 0 ? ' 🩸' : ''}`;
    sm.style.color = glow ? '#f0f' : '#888';

    const t = Math.floor(frame / 60);
    const del = deliveries.length ? ` 📦x${deliveries.length}` : '';
    document.getElementById('time-display').innerText = `⏱ ${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}${del}`;

    const btns = document.getElementById('member-btns').children;
    party.forEach((m, i) => {
        if(!btns[i]) return;
        btns[i].classList.toggle('maxed', !m.dead && m.white > 0);
        btns[i].classList.toggle('danger', !m.dead && m.black > 0);
        const face=btns[i].querySelector('.face');
        if(face&&!face.querySelector('img'))face.innerText=m.dead?'💀':(m.stun>0?'😫':m.e);
        btns[i].querySelector('.mini-gauge').style.width = m.dead ? '0%' : m.sex + '%';
    });
}

function updateMemberUI() {
    document.getElementById('member-btns').innerHTML = party.map((m, i) => {
        let cls = 'btn-member';
        if(i === activeIdx) cls += ' active';
        if(m.dead) cls += ' dead';
        else { if(m.white > 0) cls += ' maxed'; if(m.black > 0) cls += ' danger'; }
        return `<div class="${cls}" onclick="switchMember(${i})">` +
            `<span class="face">${m.dead?'💀':faceHtml(m,'face-img')}</span><div class="mini-gauge"></div></div>`;
    }).join('');
}

// ---------------- リザルト ----------------
function endGame() {
    if(isOver) return;
    isOver = true; inGame = false; paused = false;
    moveTouchId = null; gestures.clear(); joyEnd();
    document.getElementById('level-scene').style.display = 'none';
    document.getElementById('menu-scene').style.display = 'none';
    const prevBest = saveData.bestScores.length ? saveData.bestScores[0].score : 0;
    const isRecord = sessionScore > prevBest;
    saveData.bestScores.push({ score: sessionScore, date: new Date().toISOString().slice(0, 10), party: party.map(m => m.id) });
    saveData.bestScores.sort((a, b) => b.score - a.score);
    saveData.bestScores = saveData.bestScores.slice(0, 10);
    saveGame();
    showScene('result');
    resultRetryAt = Date.now() + 500;
    const title = document.getElementById('res-title');
    title.innerText = isRecord ? "NEW RECORD!!" : "全員蹂躙...敗北";
    title.style.color = isRecord ? "#ffd700" : "#f0f";
    document.getElementById('res-score').innerText = `SCORE ${sessionScore.toLocaleString()}`;
    const t = Math.floor(frame / 60);
    document.getElementById('res-stats').innerText =
        `生存時間 ${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}　撃破 ${killCount}　BOSS ${bossKills}\n` +
        `最大倍率 x${maxMult.toFixed(1)}　絆 ×${bondStacks}　自己ベスト ${saveData.bestScores[0].score.toLocaleString()}\n` +
        `最高合奏 ${ensembleLabel(saveData.bestEnsemble)}`;
    document.getElementById('res-likes').innerText = `このランのいいね ❤${sessionLikes}`;
}

// ---------------- 起動 ----------------
window.onload = () => {
    loadSave();
    preloadCharacterSprites();
    initSetupGrid();
    initShop();
    fitCanvas();
    showScene('shop');
};
window.addEventListener('resize', fitCanvas);
</script>
